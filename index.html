<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Stack Library | CSBS Admin ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+Pro:wght@400;600&display=swap');
        body { font-family: 'Source Sans Pro', sans-serif; transition: all 0.3s ease; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .stack-container-box {
            border: 8px solid #78350f; border-top: none; border-radius: 0 0 12px 12px;
            display: flex; flex-direction: column-reverse; justify-content: flex-start;
            align-items: center; padding: 8px; gap: 8px;
        }
        .animate-push { animation: pushIn 0.3s ease-out forwards; }
        @keyframes pushIn { 0% { opacity: 0; transform: translateY(-20px); } 100% { opacity: 1; transform: translateY(0); } }
        .book-title-lg { font-size: 17px; font-weight: 800; line-height: 1.2; }
    </style>
</head>
<body class="bg-stone-100 dark:bg-stone-900 text-stone-800 dark:text-stone-100 min-h-screen flex flex-col">

    <div id="login-view" class="fixed inset-0 z-[100] bg-stone-900 flex items-center justify-center">
        <div class="bg-stone-800 p-10 rounded-2xl border border-stone-700 w-full max-w-md shadow-2xl">
            <h1 class="text-4xl font-bold text-amber-500 serif-font mb-4 text-center">🏛️ The Stack Library</h1>
            <p class="text-stone-400 mb-8 text-center text-xs uppercase tracking-widest font-bold">MITS Gwalior | CSBS</p>
            
            <div class="space-y-4">
                <div class="flex bg-stone-700 p-1 rounded-xl mb-4">
                    <button onclick="toggleLoginRole('Student')" id="tab-student" class="flex-1 py-2 rounded-lg font-bold text-xs bg-amber-600 text-white">STUDENT</button>
                    <button onclick="toggleLoginRole('Librarian')" id="tab-admin" class="flex-1 py-2 rounded-lg font-bold text-xs text-stone-400">LIBRARIAN</button>
                </div>

                <div id="student-inputs">
                    <input type="text" id="card-number" placeholder="Enter Library Card Number" class="w-full px-4 py-3 bg-stone-700 rounded-xl text-white outline-none border border-stone-600 focus:border-amber-500 font-bold mb-4">
                    <button onclick="attemptLogin('Student')" class="w-full bg-amber-600 hover:bg-amber-500 py-4 rounded-xl font-bold text-white shadow-lg transition">Student Login</button>
                </div>

                <div id="admin-inputs" class="hidden">
                    <input type="password" id="admin-password" placeholder="Admin Password" class="w-full px-4 py-3 bg-stone-700 rounded-xl text-white outline-none border border-stone-600 focus:border-amber-500 font-bold mb-4">
                    <button onclick="attemptLogin('Librarian')" class="w-full bg-stone-600 hover:bg-stone-500 py-4 rounded-xl font-bold text-white shadow-lg transition text-xs uppercase">Admin Verify</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-view" class="hidden flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-amber-900 dark:bg-black text-amber-50 p-4 px-6 flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🏛️</span>
                <h1 class="text-lg font-bold serif-font tracking-tight">Stack Manager <span id="role-badge" class="ml-2 text-[10px] bg-amber-500 text-black px-2 py-0.5 rounded-full uppercase"></span></h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="fine-badge" class="hidden bg-rose-600 text-white px-3 py-1 rounded-full text-[10px] font-bold animate-pulse">Fine Due</span>
                <span class="text-xs opacity-80">ID: <b id="display-card"></b></span>
                <button onclick="document.documentElement.classList.toggle('dark')" class="bg-amber-800 dark:bg-stone-800 p-2 rounded-lg text-sm border border-amber-700">🌙</button>
                <button onclick="location.reload()" class="bg-rose-700 p-2 rounded text-xs font-bold px-4 hover:bg-rose-600 transition shadow-lg">Logout</button>
            </div>
        </header>

        <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 p-6 overflow-hidden">
            <div class="lg:col-span-4 flex flex-col gap-4 overflow-hidden">
                <div id="admin-add-book" class="hidden bg-white dark:bg-stone-800 p-4 rounded-xl border-2 border-dashed border-amber-500 shadow-inner">
                    <h3 class="text-[10px] font-bold text-amber-600 uppercase mb-2">Inventory Management</h3>
                    <div class="space-y-2">
                        <input id="new-book-title" placeholder="New Title" class="w-full p-2 text-xs rounded border dark:bg-stone-700">
                        <select id="new-book-cat" class="w-full p-2 text-xs rounded border dark:bg-stone-700 text-stone-400 font-bold">
                            <option value="DS">Data Structures</option>
                            <option value="WD">Web Development</option>
                            <option value="OT">Other Resources</option>
                        </select>
                        <button onclick="addNewBook()" class="w-full bg-amber-600 text-white py-2 rounded text-xs font-bold">Add to Library</button>
                    </div>
                </div>

                <div class="bg-white dark:bg-stone-800 p-3 rounded-xl border dark:border-stone-700 shadow-sm flex flex-col gap-2">
                    <input type="text" id="search" oninput="handleSearch(this.value)" placeholder="Search catalog..." class="w-full px-3 py-2 bg-stone-100 dark:bg-stone-700 rounded-lg text-xs outline-none focus:ring-1 focus:ring-amber-500">
                </div>
                <div id="catalog-area" class="bg-white dark:bg-stone-800 rounded-xl border dark:border-stone-700 shadow-sm flex-1 overflow-y-auto p-4 scroll-smooth"></div>
            </div>

            <div id="middle-column" class="lg:col-span-4 flex flex-col">
                <div id="student-stack-view" class="flex flex-col items-center h-full">
                    <div class="bg-amber-900 text-white p-5 rounded-2xl w-full mb-4 shadow-xl border-t-4 border-amber-500">
                        <input id="selected-title" readonly class="w-full bg-amber-950 p-3 rounded-lg mb-4 text-sm text-amber-200 border-none font-bold" placeholder="Select a book...">
                        <div class="flex gap-2">
                            <button onclick="pushBook()" class="flex-1 bg-emerald-600 py-3 rounded-xl font-bold text-xs">PUSH</button>
                            <button onclick="popBook()" class="flex-1 bg-rose-600 py-3 rounded-xl font-bold text-xs">POP</button>
                        </div>
                    </div>
                    <div id="stack-container" class="stack-container-box w-full max-w-[280px] h-[350px] dark:border-amber-900"></div>
                </div>

                <div id="admin-metrics-view" class="hidden flex flex-col gap-4 h-full overflow-hidden">
                    <div class="bg-white dark:bg-stone-800 p-4 rounded-xl border-t-4 border-indigo-500 shadow-md flex-1 flex flex-col overflow-hidden">
                        <h3 class="font-bold text-xs text-indigo-600 uppercase mb-3 tracking-widest">Active Borrowers</h3>
                        <div id="admin-borrower-box" class="flex-1 overflow-y-auto space-y-2 text-xs"></div>
                    </div>
                    <div class="bg-white dark:bg-stone-800 p-4 rounded-xl border-t-4 border-rose-500 shadow-md flex-1 flex flex-col overflow-hidden">
                        <h3 class="font-bold text-xs text-rose-600 uppercase mb-3 tracking-widest">Fine Management</h3>
                        <div id="admin-fine-box" class="flex-1 overflow-y-auto space-y-2 text-xs font-bold"></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col h-full overflow-hidden gap-4">
                <div id="admin-only-section" class="hidden flex-1 flex flex-col gap-4 overflow-hidden">
                    <div class="bg-white dark:bg-stone-800 p-4 rounded-xl border dark:border-stone-700 h-44">
                        <canvas id="statChart"></canvas>
                    </div>
                    <div class="bg-white dark:bg-stone-800 rounded-xl border dark:border-stone-700 shadow-sm flex-1 flex flex-col overflow-hidden">
                        <div class="p-3 bg-stone-50 dark:bg-stone-900 font-bold text-[10px] border-b flex justify-between items-center uppercase text-amber-800 dark:text-amber-500">
                            <span>Audit Ledger</span>
                            <button onclick="clearLogs()" class="text-rose-500 hover:underline">Clear</button>
                        </div>
                        <div id="ledger" class="flex-1 overflow-y-auto p-4 space-y-2 font-bold text-[13px] dark:text-stone-300"></div>
                    </div>
                </div>

                <div id="student-info-panel" class="bg-white dark:bg-stone-800 p-8 rounded-xl border dark:border-stone-700 flex-1 flex flex-col items-center justify-center text-center">
                    <span class="text-6xl mb-6 italic opacity-20">🏛️</span>
                    <h4 class="font-bold text-amber-800 dark:text-amber-400 mb-2 text-xl">MITS Library Portal</h4>
                    <p id="student-fine-msg" class="text-xs text-stone-500 italic uppercase tracking-widest font-bold">LIFO Session Protected</p>
                </div>
            </div>
        </main>

        <footer class="bg-stone-200 dark:bg-black text-stone-600 dark:text-stone-400 py-4 text-center text-[10px] font-bold uppercase tracking-[0.25em] border-t dark:border-stone-800">
            MADE AND DESIGNED BY ARYAN SHARMA & ABHIGYAN SINGH CHANDEL
        </footer>
    </div>

    <script>
        let currentUserRole = 'Student';
        let userCard = '';
        let books = { 'DS': [], 'WD': [], 'OT': [] };
        let visualStack = [];
        let logs = JSON.parse(localStorage.getItem('lib_logs_vFinal')) || [];
        let fines = JSON.parse(localStorage.getItem('lib_fines_vFinal')) || {};
        let chart = null;

        function toggleLoginRole(role) {
            const isStudent = role === 'Student';
            document.getElementById('student-inputs').classList.toggle('hidden', !isStudent);
            document.getElementById('admin-inputs').classList.toggle('hidden', isStudent);
            document.getElementById('tab-student').className = `flex-1 py-2 rounded-lg font-bold text-xs ${isStudent ? 'bg-amber-600 text-white' : 'text-stone-400'}`;
            document.getElementById('tab-admin').className = `flex-1 py-2 rounded-lg font-bold text-xs ${!isStudent ? 'bg-stone-600 text-white' : 'text-stone-400'}`;
        }

        function attemptLogin(role) {
            if (role === 'Student') {
                userCard = document.getElementById('card-number').value.trim();
                if (!userCard) return alert("Enter Card Number");
                startApp('Student');
            } else {
                if (document.getElementById('admin-password').value === 'mits123') {
                    userCard = "LIBRARIAN";
                    startApp('Librarian');
                } else alert("Invalid Password");
            }
        }

        function startApp(role) {
            currentUserRole = role;
            document.getElementById('role-badge').textContent = role;
            document.getElementById('display-card').textContent = userCard;
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');

            if(role === 'Librarian') {
                document.getElementById('admin-add-book').classList.remove('hidden');
                document.getElementById('admin-only-section').classList.remove('hidden');
                document.getElementById('admin-metrics-view').classList.remove('hidden');
                document.getElementById('student-stack-view').classList.add('hidden');
                document.getElementById('student-info-panel').classList.add('hidden');
                updateAdminBoxes();
                checkOverdue();
            } else {
                document.getElementById('student-stack-view').classList.remove('hidden');
                document.getElementById('student-info-panel').classList.remove('hidden');
                loadStudentStack();
                updateFineStatus();
            }

            initData();
            showFolders();
            updateStackUI();
            renderLogs();
            if(role === 'Librarian') updateChart();
        }

        function updateAdminBoxes() {
            const borrowerBox = document.getElementById('admin-borrower-box');
            const fineBox = document.getElementById('admin-fine-box');
            borrowerBox.innerHTML = '';
            fineBox.innerHTML = '';

            Object.keys(localStorage).forEach(key => {
                if(key.startsWith('stack_vFinal_')) {
                    const card = key.replace('stack_vFinal_', '');
                    const s = JSON.parse(localStorage.getItem(key));
                    if(s.length > 0) {
                        borrowerBox.innerHTML += `<div class="p-2 bg-indigo-50 dark:bg-stone-700 rounded border border-indigo-100 flex justify-between">
                            <b>ID: ${card}</b><span>Holding ${s.length} Book(s)</span></div>`;
                    }
                }
            });

            Object.keys(fines).forEach(card => {
                if(fines[card] > 0) {
                    fineBox.innerHTML += `<div class="p-2 bg-rose-50 dark:bg-rose-950/20 rounded border border-rose-200 flex justify-between items-center">
                        <span>Card ${card}: ₹${fines[card]}</span>
                        <button onclick="clearFine('${card}')" class="text-[10px] bg-rose-600 text-white px-2 py-1 rounded">CLEAR</button></div>`;
                }
            });
            if(!fineBox.innerHTML) fineBox.innerHTML = '<p class="text-stone-400 italic">No outstanding fines.</p>';
        }

        function clearFine(card) {
            fines[card] = 0;
            localStorage.setItem('lib_fines_vFinal', JSON.stringify(fines));
            addLog(`ADMIN: Cleared fine for Card ${card}`);
            updateAdminBoxes();
        }

        function initData() {
            const stored = JSON.parse(localStorage.getItem('lib_books_vFinal'));
            if(stored) books = stored;
            else {
                for(let i=0; i<15; i++) {
                    books['DS'].push({ id: `DS-${101+i}`, title: 'Algorithms Vol '+(i+1), cat: 'DS' });
                    books['WD'].push({ id: `WD-${101+i}`, title: 'Web Master '+(i+1), cat: 'WD' });
                    books['OT'].push({ id: `OT-${101+i}`, title: 'Cloud Core '+(i+1), cat: 'OT' });
                }
                localStorage.setItem('lib_books_vFinal', JSON.stringify(books));
            }
        }

        function addNewBook() {
            const t = document.getElementById('new-book-title').value.trim();
            const cat = document.getElementById('new-book-cat').value;
            if(!t) return;
            books[cat].push({ id: `${cat}-${100+books[cat].length+1}`, title: t, cat: cat });
            localStorage.setItem('lib_books_vFinal', JSON.stringify(books));
            addLog(`ADMIN: Added [${t}] to library.`);
            showFolders();
            document.getElementById('new-book-title').value = '';
        }

        function showFolders() {
            const area = document.getElementById('catalog-area');
            area.innerHTML = `<div class="space-y-3">
                <div onclick="openFolder('DS')" class="p-4 bg-indigo-50 dark:bg-stone-900 border-2 border-indigo-200 rounded-xl cursor-pointer">🧠 Data Structures</div>
                <div onclick="openFolder('WD')" class="p-4 bg-emerald-50 dark:bg-stone-900 border-2 border-emerald-200 rounded-xl cursor-pointer">🌐 Web Development</div>
                <div onclick="openFolder('OT')" class="p-4 bg-amber-50 dark:bg-stone-900 border-2 border-amber-200 rounded-xl cursor-pointer">📁 Other Resources</div>
            </div>`;
        }

        function openFolder(key) {
            const area = document.getElementById('catalog-area');
            let html = `<button onclick="showFolders()" class="text-[10px] bg-stone-800 text-white px-3 py-1 rounded-full mb-3">← Folders</button><div class="space-y-2">`;
            books[key].forEach(b => {
                html += `<div onclick="selectBook('${key}', '${b.id}')" class="p-3 border rounded-xl hover:border-amber-500 cursor-pointer flex justify-between items-center"><span class="book-title-lg text-xs">${b.title}</span><span class="text-[9px] font-bold text-amber-600">${b.id}</span></div>`;
            });
            area.innerHTML = html + `</div>`;
        }

        function selectBook(folder, id) {
            selected = books[folder].find(b => b.id === id);
            document.getElementById('selected-title').value = selected.title;
        }

        function pushBook() {
            if(!selected) return;
            if(visualStack.length >= 3) return alert("Limit: 3 Books.");
            const entry = { ...selected, raw: Date.now(), card: userCard };
            visualStack.push(entry);
            localStorage.setItem(`stack_vFinal_${userCard}`, JSON.stringify(visualStack));
            addLog(`ISSUE: Card ${userCard} took ${entry.id}`);
            updateStackUI();
            document.getElementById('selected-title').value = '';
        }

        function popBook() {
            if(visualStack.length === 0) return;
            const book = visualStack.pop();
            const elapsed = (Date.now() - book.raw) / 1000;
            let logTag = "On Time";
            if (elapsed > 60) {
                const amt = Math.ceil((elapsed-60)/60) * 5;
                fines[userCard] = (fines[userCard] || 0) + amt;
                localStorage.setItem('lib_fines_vFinal', JSON.stringify(fines));
                logTag = `LATE! Fine ₹${amt}`;
                updateFineStatus();
            }
            localStorage.setItem(`stack_vFinal_${userCard}`, JSON.stringify(visualStack));
            addLog(`POP: Card ${userCard} returned ${book.id} (${logTag})`);
            updateStackUI();
        }

        function updateFineStatus() {
            const amt = fines[userCard] || 0;
            document.getElementById('fine-badge').classList.toggle('hidden', amt === 0);
            document.getElementById('student-fine-msg').innerHTML = amt > 0 ? `<span class="text-rose-500 font-bold">Outstanding Fine: ₹${amt}</span>` : "Session Protected";
        }

        function checkOverdue() {
            const now = Date.now();
            let overdue = [];
            Object.keys(localStorage).forEach(key => {
                if(key.startsWith('stack_vFinal_')) {
                    JSON.parse(localStorage.getItem(key)).forEach(b => { if((now - b.raw)/3600000 >= 24) overdue.push(`ID ${b.card}`); });
                }
            });
            if(overdue.length > 0) alert("⚠️ LATE ALERT:\nCards: " + [...new Set(overdue)].join(', '));
        }

        function loadStudentStack() { visualStack = JSON.parse(localStorage.getItem(`stack_vFinal_${userCard}`)) || []; }
        function updateStackUI() {
            const container = document.getElementById('stack-container');
            if(!container) return;
            container.innerHTML = '';
            visualStack.forEach(b => {
                const el = document.createElement('div');
                el.className = `w-full bg-white dark:bg-stone-800 border-2 rounded-xl p-3 text-center animate-push shadow-md border-amber-600/20`;
                el.innerHTML = `<p class="book-title-lg uppercase">${b.title}</p><p class="text-[10px] font-bold opacity-60">ID: ${b.card}</p>`;
                container.appendChild(el);
            });
        }

        function addLog(t) {
            logs.unshift(`[${new Date().toLocaleTimeString()}] ${t}`);
            localStorage.setItem('lib_logs_vFinal', JSON.stringify(logs));
            if(currentUserRole === 'Librarian') renderLogs();
        }

        function renderLogs() {
            const container = document.getElementById('ledger');
            if(!container) return;
            container.innerHTML = logs.map(l => `<div class="p-2 bg-stone-50 dark:bg-stone-900 border-l-4 border-amber-600 rounded shadow-sm ${l.includes('LATE!') ? 'border-rose-500' : ''}">${l}</div>`).join('');
        }

        function clearLogs() { logs = []; localStorage.setItem('lib_logs_vFinal', JSON.stringify(logs)); renderLogs(); }

        function updateChart() {
            let ds=0, wd=0, ot=0;
            Object.keys(localStorage).forEach(key => {
                if(key.startsWith('stack_vFinal_')) {
                    const s = JSON.parse(localStorage.getItem(key));
                    ds += s.filter(b => b.id.startsWith('DS')).length;
                    wd += s.filter(b => b.id.startsWith('WD')).length;
                    ot += s.filter(b => b.id.startsWith('OT')).length;
                }
            });
            const ctx = document.getElementById('statChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'bar', data: { labels: ['DS', 'WD', 'Other'], datasets: [{ data: [ds, wd, ot], backgroundColor: ['#6366f1', '#10b981', '#f59e0b'] }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }
    </script>
</body>
</html>
